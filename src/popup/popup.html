<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Northr</h1>
    <span>Identity</span>
  </div>

  <!-- Login -->
  <div id="login-view" style="display:none;">
    <div class="login-form">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button class="btn" id="login-btn">Sign In</button>
      <div class="error" id="login-error"></div>
      <a href="https://identity.northr.ai/signup" target="_blank" class="link">Don\'t have an account? Sign up</a>
    </div>
  </div>

  <!-- Main -->
  <div id="main-view" style="display:none;">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-identity">Identity</button>
      <button class="tab" id="tab-projects">Projects</button>
    </div>

    <!-- Identity Tab -->
    <div id="identity-panel">
      <div id="blocks-grid" class="blocks-grid"></div>
      <div id="watermark-toggle" class="watermark-row">
        <label class="watermark-label">
          <input type="checkbox" id="watermark-check"> <span>Add "powered by northr.ai" to injections</span>
        </label>
      </div>
      <div id="edit-area" style="display:none;">
        <div class="edit-header">
          <span id="edit-title"></span>
          <span class="edit-close" id="edit-close">&times;</span>
        </div>
        <textarea id="edit-textarea" class="edit-textarea" placeholder="Write about yourself..."></textarea>
        <button class="btn" id="edit-save" style="width:100%;margin-top:6px;">Save</button>
      </div>
    </div>

    <!-- Projects Tab -->
    <div id="projects-panel" style="display:none;">
      <div id="projects-tree"></div>
      <div id="inject-controls" style="display:none;">
        <div class="inject-row">
          <label class="inject-label">Inject as</label>
          <select id="inject-block-select" class="inject-select"></select>
        </div>
        <div class="inject-row">
          <label class="inject-label">+ Project</label>
          <select id="inject-project-select" class="inject-select">
            <option value="">None</option>
          </select>
        </div>
        <button class="btn" id="inject-context-btn" style="width:100%;margin-top:8px;">Inject &#8594;</button>
      </div>
    </div>

    <!-- Shared footer -->
    <div class="sync-info" id="sync-info">Last synced: never</div>

    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn btn-secondary" id="refresh-btn" style="flex:1;">&#8635; Refresh</button>
      <button class="btn btn-secondary" id="dashboard-btn" style="flex:1;">Dashboard &#8599;</button>
    </div>

    <button class="btn btn-secondary" id="logout-btn" style="width:100%;margin-top:8px;">Sign Out</button>
  </div>

  <!-- Loading -->
  <div id="loading-view">
    <div style="text-align:center;padding:24px;color:#64748b;">Loading...</div>
  </div>

  <div class="footer-link">
    <a href="https://identity.northr.ai" target="_blank">identity.northr.ai</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
